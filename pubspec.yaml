name: devfunmi
description: "Emmanuel Olufunmilayo — Senior Flutter & Mobile Engineer portfolio website."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  url_launcher: ^6.3.0
  http: ^1.2.0
  web: ^1.0.0
  flutter_bloc: ^8.1.6
  get_it: ^8.0.0
  injectable: ^2.4.2
  freezed_annotation: ^2.4.1
  hugeicons: ^0.0.7
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  injectable_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/cv/
    - assets/icons/

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-Medium.ttf
          weight: 500
