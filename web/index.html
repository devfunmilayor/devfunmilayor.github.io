  <style>
    #fl-loading {
      position: fixed;
      inset: 0;
      background: #0A0A0F;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #fl-loading.hide {
      opacity: 0;
      pointer-events: none;
    }
    .fl-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0, 255, 178, 0.15);
      border-top-color: #00FFB2;
      border-radius: 50%;
      animation: fl-spin 0.8s linear infinite;
    }
    @keyframes fl-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="fl-loading">
    <div class="fl-spinner"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('fl-loading');
      if (loader) {
        loader.classList.add('hide');
        setTimeout(function () { loader.remove(); }, 350);
      }
    });
  </script>
  <script>
    var _pwaPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      _pwaPrompt = e;
    });
    window.addEventListener('appinstalled', function () {
      _pwaPrompt = null;
    });
    window.isPWAInstallable = function () { return !!_pwaPrompt; };
    window.triggerPWAInstall = async function () {
      if (!_pwaPrompt) return 'unavailable';
      _pwaPrompt.prompt();
      var result = await _pwaPrompt.userChoice;
      _pwaPrompt = null;
      return result.outcome;
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
